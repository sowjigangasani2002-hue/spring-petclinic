name: Java-workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    name: my-spec
    runs-on: self-hosted

    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      # - name: Build Java with Maven
      #   run: mvn package
        
      - name: SonarQube Scan
        env:
          SONAR_TOKEN:${{ secrets.SONAR_TOKEN}}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=petclinic -Dsonar.projectkey=sowjigangasani2002-hue_spring-petclinic
          


        
      
        

